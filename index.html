<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMS Tools</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }
      .shell {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .topbar {
        background: #ffffff;
        border-bottom: 1px solid #e5e7eb;
        padding: 12px 20px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .tab-button {
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        color: #374151;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        padding: 10px 14px;
      }
      .tab-button.active {
        background: #2563eb;
        border-color: #2563eb;
        color: #ffffff;
      }
      .tab-frame {
        border: 0;
        display: none;
        flex: 1;
        width: 100%;
      }
      .tab-frame.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="tabs">
          <button
            class="tab-button active"
            type="button"
            data-frame-target="nvnSolutionsFrame"
          >
            NVN Solutions
          </button>
          <button
            class="tab-button"
            type="button"
            data-frame-target="callLogFrame"
          >
            Call Log
          </button>
          <button
            class="tab-button"
            type="button"
            data-frame-target="sumaryticketFrame"
          >
            Sumary Ticket
          </button>
        </div>
      </div>

      <iframe
        class="tab-frame active"
        id="nvnSolutionsFrame"
        src="nvn_solutions.html"
        title="NVN Solutions"
      ></iframe>
      <iframe
        class="tab-frame"
        id="callLogFrame"
        src="call_log.html"
        title="Call Log"
      ></iframe>
      <iframe
        class="tab-frame"
        id="sumaryticketFrame"
        src="sumary_ticket.html"
        title="Sumary Ticket  "
      ></iframe>
    </div>

    <script>
      const tabButtons = Array.from(document.querySelectorAll(".tab-button"));
      const tabFrames = Array.from(document.querySelectorAll(".tab-frame"));

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const targetId = button.dataset.frameTarget;
          tabButtons.forEach((item) => {
            item.classList.toggle("active", item === button);
          });
          tabFrames.forEach((frame) => {
            frame.classList.toggle("active", frame.id === targetId);
          });
        });
      });
    </script>
  </body>
</html>
